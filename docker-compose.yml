services:
  andaflare:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: andaflare
    restart: unless-stopped
    ports:
      - '80:80'     # HTTP
      - '81:81'     # Admin UI
      - '443:443'   # HTTPS
    environment:
      DB_SQLITE_FILE: ${DB_SQLITE_FILE:-/data/database.sqlite}
      DISABLE_IPV6: ${DISABLE_IPV6:-false}
      NODE_ENV: ${NODE_ENV:-production}
      
      # Discord Bot
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID}
      DISCORD_ADMIN_IDS: ${DISCORD_ADMIN_IDS}
      
      # DDoS Protection
      ENABLE_DDOS_PROTECTION: ${ENABLE_DDOS_PROTECTION:-true}
      REDIS_URL: redis://redis:6379
      ATTACK_THRESHOLD_PER_MINUTE: ${ATTACK_THRESHOLD_PER_MINUTE:-2000}
      ATTACK_THRESHOLD_PER_SECOND: ${ATTACK_THRESHOLD_PER_SECOND:-100}
      
      # CAPTCHA
      CAPTCHA_EXPIRE_SECONDS: ${CAPTCHA_EXPIRE_SECONDS:-300}
      COOKIE_EXPIRE_SECONDS: ${COOKIE_EXPIRE_SECONDS:-86400}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_TO_FILE: ${LOG_TO_FILE:-true}
    
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
      - ./logs:/var/log/andaflare
    
    cap_add:
      - NET_ADMIN  # Required for iptables DDoS protection
    
    depends_on:
      - redis
    
    networks:
      - andaflare-network

  redis:
    image: redis:7-alpine
    container_name: andaflare-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - andaflare-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  andaflare-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
